n\nwhat's left is denser. creamier. more protein per serving.\nnot because we added anything.\nbecause we took time to remove what wasn't needed.\n\nsimple math. patient process.","caption_th":"why is our yogurt thicker than most?\nplot twist: no starch. no thickener. no shortcut.\n\nit's just strained longer.\n\nregular yogurt: strain once, keep the whey.\ngreek yogurt: strain again. and again.\nuntil most of the liquid is gone.\n\nwhat's left is denser. creamier. more protein per serving.\nnot because we added anything.\nbecause we took time to remove what wasn't needed.\n\nsimple math. patient process.\n\n#YogurtCulture #SlowStrained #GreekYogurt #HowItsMade #NoAdditives #EveryDropCounts","hashtags":["#YogurtCulture","#SlowStrained","#GreekYogurt","#HowItsMade","#NoAdditives","#EveryDropCounts"],"hook_note":"EN flagship — hook คำถาม → plot twist เฉลย 'no additives just time' → contrast regular vs greek → จบด้วย simple summary","topicAvg":9.2,"captionAvg":9.0,"captionMin":8.8,"image_prompt":"Vertical 4:5 poster 1080x1350. Split-panel infographic style. Left: regular yogurt loose texture. Right: greek yogurt thick dense texture. Arrow showing straining process. Blue (#84D7FF) accent lines, black doodles on white. [INSERT LOGO] top. BigSmalls Bold EN headline: 'strained longer. not stronger.'"},{"id":"J3","pillar":"Engagement","style":"03-funny","title":"วันฝนตก + ตู้เย็น + โยเกิร์ต = สมการที่ไม่ต้องคิด","angle":"Funny/relatable — rainy season situation + options A/B/C format ที่คนชอบ engage","caption_body":"วันฝนตก ทำอะไรดี?\n\noption A: นอนต่อ\noption B: ดูซีรีส์\noption C: เปิดตู้เย็น เจอ Greek Yogurt เย็นๆ\n\n(เราไม่ได้บอกว่าคำตอบไหนถูก)\n(แต่ C ไม่ต้องแก้ตัวใคร)","caption_th":"วันฝนตก ทำอะไรดี?\n\noption A: นอนต่อ\noption B: ดูซีรีส์\noption C: เปิดตู้เย็น เจอ Greek Yogurt เย็นๆ\n\n(เราไม่ได้บอกว่าคำตอบไหนถูก)\n(แต่ C ไม่ต้องแก้ตัวใคร)\n\n#YogurtCulture #RainySeason #FridgeMoment #NoJudgement #EveryDropCounts","hashtags":["#YogurtCulture","#RainySeason","#Fridg ง'."},{"id":"J8","pillar":"Education","style":"01-education","title":"Greek Yogurt vs โยเกิร์ตธรรมดา — ต่างกันยังไง","angle":"Education — contrast Greek vs regular เข้าใจง่าย ชัด ช่วยให้คนเลือกได้ถูกต้อง","caption_body":"greek yogurt vs regular yogurt\n\nsame starting point: milk + cultures.\ndifferent ending: how long it strains.\n\nregular: strained once. looser texture. more liquid.\ngreek: strained longer. thicker. more protein per cup.\n\nthat extra time in the strainer?\nthat's the whole difference.\n\nno magic. no secret ingredient.\njust patience.","caption_th":"greek yogurt vs regular yogurt\n\nsame starting point: milk + cultures.\ndifferent ending: how long it strains.\n\nregular: strained once. looser texture. more liquid.\ngreek: strained longer. thicker. more protein per cup.\n\nthat extra time in the strainer?\nthat's the whole difference.\n\nno magic. no secret ingredient.\njust patience.\n\n#YogurtCulture #GreekYogurt #Education #DidYouKnow #RealYogurt #EveryDropCounts","hashtags":["#YogurtCulture","#GreekYogurt","#Education","#DidYouKnow","#RealYogurt","#EveryDropCounts"],"hook_note":"EN — hook contrast สองสิ่ง → อธิบาย process สั้นๆ → จบด้วย 'just patience' ตอกย้ำ brand value","topicAvg":9.3,"captionAvg":9.1,"captionMin":8.9,"image_prompt":"Vertical 4:5 poster 1080x1350. Side-by-side: left = regular yogurt (loose, pourable), right = greek yogurt (thick, spoon stands up). White background. Hand-drawn doodle arrows in Blue (#84D7FF). 'vs' in BigSmalls Bold black center. [INSERT LOGO] top."},{"id":"J9","pillar":"Inspiration","style":"04-inspiration","title":"ถ้วยเล็ก เช้าที่ยาก — เล็กน้อยก็มีความหมาย","angle":"Inspiration — emotional moment เชื่อม 'การดูแลตัวเองในวันที่ยาก' กับ routine เล็กๆ ที่ทำได้จริง","caption_body":"ไม่ต้องทำอะไรใหญ่โต\n\nบางวันแค่มี Greek Yogurt รอในตู้เย็น\nก็รู้สึกว่าดูแลตัวเองได้แล้ว\n\nเล็กน้อย\nแต่มีความหมาย","caption_th":"ไม่ต้องทำอะไรใหญ่โต\n\nบางวันแค่มี Greek Yogurt รอในตู้เย็น\nก็รู้สึกว่าดูแลตัวเองได้แล้ว\n\nเล็กน้อย const TODAY = '2026-06-23';
const CAL_YEAR = 2026, CAL_MONTH = 6; // July (0-indexed)

function iso(y, m, d) { return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }

function copyText(t) {
  if (navigator.clipboard && navigator.clipboard.writeText) return navigator.clipboard.writeText(t);
  return new Promise((res) => {
    const ta = document.createElement('textarea'); ta.value = t; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); } catch(e){}
    document.body.removeChild(ta); res();
  });
}

function CopyBtn({ text, label, big, tone }) {
  const [done, setDone] = useState(false);
  const cls = tone === 'dark'
    ? 'bg-ink text-white hover:bg-black'
    : 'bg-white/70 text-ink hover:bg-white border border-ink/15';
  return (
    <button
      onClick={() => { copyText(text).then(() => { setDone(true); setTimeout(()=>setDone(false), 1600); window.__toast && window.__toast(); }); }}
      className={`inline-flex items-center gap-1.5 rounded-xl font-medium transition-all duration-200 cursor-pointer active:scale-95 ${cls} ${big ? 'px-4 py-2.5 text-sm' : 'px-3 py-1.5 text-xs'}`}
    >
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
        {done
          ? <polyline points="20 6 9 17 4 12" />
          : <><rect x="9" y="9" width="13" height="13" rx="2" /><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" /></>}
      </svg>
      {done ? 'คัดลอกแล้ว' : label}
    </button>
  );
}

function CalendarView({ onOpen }) {
  const schedMap = useMemo(() => {
    const m = {};
    DATA.schedule.forEach(s => { m[s.date] = DATA.posts[s.id]; });
    return m;
  }, []);
  const weeks = useMemo(() => {
    const first = new Date(CAL_YEAR, CAL_MONTH, 1).getDay();
    const days = new Date(CAL_YEAR, CAL_MONTH + 1, 0).getDate();
    const cells = [];
    for (let i=0;i<first;i++) cells.push(null);
    for (let d=1; d<=days; d++) cells.push(d);
    while (cells.length % 7) cells.push(null);
    const w = []; for (let i=0;i<cells.length;i+=7) w.push(cells.slice(i,i+7));
    return w;

              <button key={p.id} onClick={()=>onOpen(p.id)}

// ---------- toast ----------
function Toast() {
  const [show, setShow] = useState(false);
  useEffect(()=>{ window.__toast = ()=>{ setShow(true); setTimeout(()=>setShow(false), 1500); }; }, []);
  if (!show) return null;
  return (
    <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-[60] bg-ink text-white text-sm font-medium px-5 py-2.5 rounded-full shadow-2xl flex items-center gap-2" style={{animation:'toastin .2s ease-out both'}}>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      คัดลอกไปคลิปบอร์ดแล้ว
    </div>
  );
}

// ---------- theme + font-size controls ----------
function Controls(){
  const [theme,setTheme]=useState(()=>{ try{return localStorage.getItem('yc-theme')||'system';}catch(e){return 'system';} });
  const [scale,setScale]=useState(()=>{ try{return parseFloat(localStorage.getItem('yc-scale'))||1.15;}catch(e){return 1.15;} });
  useEffect(()=>{
    const apply=()=>{ const dark = theme==='dark' || (theme==='system' && window.matchMedia('(prefers-color-scheme: dark)').matches); document.documentElement.classList.toggle('dark', dark); };
    apply(); try{localStorage.setItem('yc-theme',theme);}catch(e){}
    if(theme==='system'){ const mq=window.matchMedia('(prefers-color-scheme: dark)'); mq.addEventListener('change',apply); return ()=>mq.removeEventListener('change',apply); }
  },[theme]);
  useEffect(()=>{ document.documentElement.style.zoom=scale; try{localStorage.setItem('yc-scale',String(scale));}catch(e){} },[scale]);
  const ic = theme==='light'?'☀️':theme==='dark'?'🌙':'💻';
  const lb = theme==='light'?'สว่าง':theme==='dark'?'มืด':'ตามระบบ';
  const cycle=()=>setTheme(t=> t==='light'?'dark':t==='dark'?'system':'light');
  const dec=()=>setScale(s=>Math.max(0.9, Math.round((s-0.1)*10)/10));
  const inc=()=>setScale(s=>Math.min(1.7, Math.round((s+0.1)*10)/10));
  const btn="grid place-items-center w-7 h-7 rounded-full hover:bg-white/60 transition-colors cursor-pointer text-ink font-bold leading-none";
  return (
    <div className="ml-auto flex items-center gap-1.5">
      <div className="flex items-center gap-0.5 glass-soft rounded-full p-1" role="group" aria-label="ขนาดตัวอักษร">
        <button onClick={dec} className={btn} aria-label="ลดขนาดตัวอักษร">A−</button>
        <button onClick={()=>setScale(1.15)} className="px-1.5 text-[11px] font-semibold text-ink/60 hover:text-ink cursor-pointer tabular-nums" title="รีเซ็ตขนาด" aria-label="รีเซ็ตขนาดตัวอักษร">{Math.round(scale*100)}%</button>
        <button onClick={inc} className={btn} aria-label="เพิ่มขนาดตัวอักษร">A+</button>
      </div>
      <button onClick={cycle} className="inline-flex items-center gap-1.5 glass-soft rounded-full pl-2.5 pr-3 py-1.5 text-[12px] font-semibold text-ink hover:bg-white/60 transition-colors cursor-pointer" aria-label={`ธีมตอนนี้ ${lb} กดเพื่อสลับ สว่าง/มืด/ตามระบบ`}>
        <span aria-hidden="true">{ic}</span> {lb}
      </button>
    </div>
  );
}
