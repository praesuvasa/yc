iant)"}, {"id": 2, "pillar": "Education", "title": "น้ำใสๆ บนหน้าโยเกิร์ตที่คุณเททิ้ง คือโปรตีนล้วนๆ", "angle": "เปิดด้วยภาพคุ้นเคย (เคยเห็นน้ำขุ่นลอยบนโยเกิร์ตแล้วเททิ้งไหม) → เฉลยว่าคือ whey เต็มไปด้วยโปรตีน แล้วโยงว่า YC เอามาทำเป็นเครื่องดื่ม — Yogurt Geek สอนแบบเพื่อน", "topicAvg": 9, "topicMin": 9, "caption_th": "that watery layer on top of your yogurt? 👀\nmost people pour it straight down the drain.\nplot twist: that's not spoilage. it's whey.\nwhey is protein — the same kind gym folks scoop from a tub.\nyours just comes naturally, straight from real yogurt.\ndon't toss it. stir it back in.\nthe yogurt turns creamy again, nothing wasted.\nit's totally normal — it just means your yogurt is real.\nnext time you see that liquid, stir, don't pour.\n\n#YogurtCulture #Whey #RealYogurt #DontTossIt #EveryDropCounts", "hashtags": ["#YogurtCulture", "#Whey", "#RealYogurt", "#DontTossIt", "#EveryDropCounts"], "hook_note": "เปิดด้วยภาพคุ้นเคยที่คนเกือบทุกคนเคยทำจริง (เห็นน้ำใสๆ บนโยเกิร์ตแล้วเททิ้งเพราะนึกว่าเสีย) + คำสั่ง \"หยุดมือตรงนั้นก่อน\" สร้างสะดุดและ pattern interrupt ใน 2 บรรทัดแรก ทำให้คนอ่านต่อทันที จาก mistake ของตัวเอง แล้วค่อยเฉลยความรู้ (whey = โปรตีน) แบบเพื่อน Yogurt Geek สอน ไม่ใช่โฆษณา ปิดด้วยทั้ง tip ใช้ได้จริง (คนกลับไป) และโยง YC drinking yogurt + signature \"ทุกหยดมีความหมาย\" — มี share trigger สูงเพราะเป็นความรู้ที่คนอยากบอกต่อว่า \"อย่าเททิ้งนะ\"", "captionAvg": 9.3, "captionMin": 8.5, "image_prompt": "Vertical 4:5 social post (1080x1350px) for an educational \"Yogurt Geek explains\" post about whey.\n\nCOMPOSITE LAYOUT: Reserve the TOP 40% of the frame as clean empty white negative space for a English headline (do not fill it). In the LOWER-CENTER, place this exact placeholder, framed straight-on:\n[INSERT REAL PRODUCT PHOTO: top-down 90-degree shot of an opened Yogurt Culture greek yogurt cup with a thin layer of pale watery whey pooled and separated on the surface of the yogurt, a spoon resting beside the cup — shot on plain pure-white #FFFFFF surface, soft natural side light]\nScale the product photo so the open cup sits centered in the bottom two-thirds, leaving breathing room around it.\n\nART DIRECTION / DOODLE OVERLAY (flat 2D, thick bold black #000000 hand-drawn outline doodles, marker-style, NO shading, NO 3D): \n- A bold black hand-drawn ARROW pointing from empty space down toward the watery whey layer on the yogurt surface, calling it out.\n- A small doodle word-badge \"EVERY DROP COUNTS\" in a hand-drawn black outline banner, one accent fill in Tasty Orange #FF8C33, placed near the cup edge.\n- One doodle dripping-yogurt spoon icon and a few scattered doodle droplets (black outline, some filled Dairy Blue #84D7FF) floating in the white space at lower-left.\n- A tiny doodle smiling mouth/tongue icon (black outline, lips filled Mouthful Red #F2565C) bottom-right corner as the Jester signature.\nKeep all doodles thin-to-medium weight, playful, sparse — they frame the product, they don't crowd it. Leave the top headline zone almost empty (maybe one tiny droplet doodle only).\n\nCOMPOSITION: clean editorial flat-lay feel, lots of white space, product as hero, doodles as annotation layer like a friendly hand-drawn explainer/textbook note.\nLIGHTING: bright, soft, even daylight — fresh \"cold yogurt on a sunny morning\" mood, crisp and clean, no harsh shadows.\nCAMERA: perfectly top-down / flat-lay, straight-on, no perspective distortion, sharp focus on the whey layer.\nMOOD: friendly, smart, reassuring, a little playful — a yogurt nerd showing you a cool fact.\n\nSTRICT COLOR RULES: use ONLY these exact brand colors — white #FFFFFF (dominant background, ~50%), black #000000 (all doodle linework + base), Mouthful Red #F2565C, Dairy Blue #84D7FF, Tasty Orange #FF8C33 (small accents only). The yogurt and whey keep their natural off-white/cream tone from the real photo. NO other colors anywhere, NO gradients, NO drop shadows, NO glow, no pastel tints outside this palette, flat solid fills only.\n\nNega ulture #ReadTheLabel #LiveCultures #RealYogurt #SlowStrained #EveryDropCounts", "hashtags": ["#YogurtCulture", "#ReadTheLabel", "#LiveCultures", "#RealYogurt", "#SlowStrained", "#EveryDropCounts"], "hook_note": "เปลี่ยน hook จากเหตุการณ์ของแบรนด์เอง (\"เพิ่งกินยี่ห้อดังหมดถ้วยเมื่อเช้า\") เป็นคำถามจี้ตัวผู้อ่านโดยตรง \"เคยกินโยเกิร์ตจนหมดถ้วย แล้วแอบรู้สึกว่ามันเหมือนกินขนมหวานทุกวันไหม?\" ตามโน้ต Brand Storyteller — ใช้ \"คุณ/เคย\" ทำให้คนรู้สึกโดนพูดถึงและหยุดเลื่อนฟีดเร็วขึ้น เปิดด้วยอารมณ์จริง (ความผิดหวังเงียบๆ ทั้งที่ตั้งใจดูแลตัวเอง) ไม่เปิดด้วยนิยาม. เพิ่ม pivot กลางโพสต์ \"แล้วถ้วยที่ผ่านครบ 3 ข้อ หน้าตาเป็นยังไง?\" ตามโน้ต Foodie — ใส่ visual ถ้วย Yogurt Culture ที่ผ่านทั้ง 3 สัญญาณแบบ 1 ข้อ = 1 บรรทัด (เปรี้ยวกำลังดี / ข้นช้อนตั้งได้ / ฉลากมีจุลินทรีย์มีชีวิต) แล้วต่อด้วยเมนูจริงจาก BRAND.md (Crunchy Berry Bliss, Banoffee, Create Your Own + ท็อปปิ้ง chia/honey) ให้ Foodie อยากลองแทนที่จะแค่รู้สึกว่าโยเกิร์ตเดิมตกคุณภาพ. รักษาบุคลิก Sage+Caregiver+Yogurt Geek ให้ความรู้เลือกโยเกิร์ตโดยไม่เคลมรักษาโรค (ใช้ \"ดูแลลำไส้/ตัวช่วย\" ไม่ใช่ \"รักษา\"), ไม่แต่งราคา, อีโมจิ 0 ตัว, ปิดด้วยประโยค quotable เดิมที่ผู้อ่านน่าจะจำได้.", "captionAvg": 8.5, "captionMin": 8.5, "image_prompt": "A 4:5 vertical social media graphic (1080x1350px) for an Instagram/Facebook educational checklist post by a Greek yogurt brand. Flat-design, hand-drawn editorial poster aesthetic — clean and diagnostic, like a friendly \"check-yourself\" infographic, NOT a busy collage.\n\nSTRICT COLOR PALETTE — use ONLY these exact colors, no other colors whatsoever, absolutely NO gradients, no shadows-with-tint, no pastels outside this set: white #FFFFFF, black #000000, Mouthful Red #F2565C, Dairy Blue #84D7FF, Tasty Orange #FF8C33. Everything must be flat solid fills.\n\nBACKGROUND: clean solid white #FFFFFF base. Keep it airy and uncluttered.\n\nLAYOUT (top-to-bottom):\n- TOP THIRD: generous empty NEGATIVE SPACE reserved for a lowercase English headline (do NOT render the headline text — leave this zone clean white so it can be added later). Optionally place a single small hand-drawn black doodle word-badge reading \"EVERY DROP COUNTS\" or \"TASTY!\" in a wonky speech-bubble outline tucked into the top corner, filled flat Tasty Orange #FF8C33 with thick black #000000 outline.\n- MIDDLE BAND — the \"3-signal checklist\" motif: three thick-outlined hand-drawn doodle checklist rows stacked vertically, each row a bold black #000000 outlined rounded box on white. Row 1 marked with a hand-drawn red #F2565C \"X\" cross (a warning, not approval) beside a doodle of an open mouth/tongue tasting (signal: tastes sweet first); Row 2 a red #F2565C \"X\" beside a doodle product label/tag with a tiny magnifying glass (signal: no live cultures on label); Row 3 a red #F2565C \"X\" beside a doodle spoon with thin runny yogurt dripping/pouring off (signal: too watery, runs off the spoon). Doodles in the brand's bold-black-marker style: thick uneven outlines, playful, with selective flat color spots only (strawberry red #F2565C, blueberry/dairy blue #84D7FF, banana orange #FF8C33). Keep these three rows simple and readable.\n- HERO ZONE (lower-middle / center): [INSERT REAL PRODUCT PHOTO: real photograph of Yogurt Culture's thick plain Greek yogurt cup, shot at a 45-degree angle, with a spoon lifted showing the yogurt standing on the spoon without dripping — placed as the \"this is what a cup that passes all 3 signals looks like\" answer. Composite the real photo cleanly cut-out onto the white background, centered, the single largest element, casting only a soft pure-grey-free flat treatment — keep edges crisp]. Around the real cup, draw a hand-drawn black #000000 burst/starburst outline and a single big green-free approving doodle: a black-outlined hand giving an \"OK\" / thumbs-style gesture filled flat Dairy Blue #84D7FF, plus one doodle check-tick in Tasty Orange #FF8C33 to contrast the red X's above (this cup PASSES). Scatter 2-3 tiny doodle berries (strawberry #F2565C, blueberry #84D7FF) near the base, sparingly.\n- BOTTOM STRIP: a thin flat black #000000 footer bar spanning the width, leaving room — keep minimal, no fake logo, no invented text.\n\nCOMPOSITION & ART DIRECTION: strong central vertical axis, the real yogurt cup as the clear focal hero with the doodles acting as a supporting \"diagnostic frame\" around it. Visual story = three red-X warning signals at top giving way to one orange-check hero answer below (problem → solution). High contrast flat graphic look, confident negative space, mobile-first legibility — big shapes, nothing tiny or fussy.\nLIGHTING/MOOD (applies to how the real product photo should be shot to match): bright clean natural morning daylight, soft and fresh like opening a cold cup of yogurt on a sunny morning, no moody shadows, white-on-white airy, trustworthy and appetizing. CAMERA for the real photo: 45-degree eye-level macro, shallow-ish focus on the spoon-standing yogurt to prove thickness.\n\nNEGATIVE / DO NOT: no colors outside #FFFFFF #000000 #F2565C #84D7FF #FF8C33; no gradients; no drop shadows with color; no realistic 3D rendering of the doodles (keep them flat hand-drawn); no rendered English headline text in the top negative space; no fake logos, prices, or menu text; no medical/disease claims iconography; no green, no yellow, no brown, no purple.", "product_hero": "ถ้วยกรีกโยเกิร์ต plain ของ Yogurt Culture (สูตรกรองเวย์จนข้น) ถ่ายมุมเฉียง 45 องศาให้เห็นเนื้อข้น โชว์ช้อนตักยกขึ้นแล้วเนื้อโยเกิร์ต \"ตั้งช้อนได้\" ไม่ไหลทิ้ง (สื่อสัญญาณที่ 3 ในแคปชั่น) — ฉากหลังพื้นขาวสะอาด แสงธรรมชาตินุ่มแบบเช้าแดดดี ถ้าได้ถ้วยที่เห็นฉลาก \"live cultures / จุลินทรีย์มีชีวิต\" ชัดเจนยิ่งดี (สื่อสัญญาณที่ 2). ทางเลือกเสริมถ้าอยากถ่าย: เมนู Crunchy Berry Bliss (เบอร์รี+ถั่วกรุบ) วางเป็นถ้วยรองข้างๆ เพื่อโชว์ความสดชื่นเปรี้ยว", "headline_th": "is your yogurt just dessert?", "voice": "YC voice v2 (brand-brief compliant)"}, {"id": "N5", "pillar": "Education", "title": "Plain ไม่ใช่จืด — รสที่ยังไม่ถูกกลบ", "angle": ": "Branding", "title": "ชื่อ Culture ไม่ได้แปลว่าวัฒนธรรม — แต่มาจากสิ่งที่เกิดในนมทุกคืน", "angle": "เปิดด้วย hook พลิกความเข้าใจ (Culture ที่หลายคนคิดว่า=วัฒนธรรม จริงๆ มาจาก culture = เชื้อจุลินทรีย์ที่เปลี่ยนนมเป็นโยเกิร์ต) เชื่อมที่มาชื่อแบรนด์เข้ากับ science สาย Yogurt Geek + Origin Story ที่จบใน 2 บรรทัดแรก", "topicAvg": 9.4, "topicMin": 9, "caption_th": "ever wondered what \"culture\" means in our name? 👀\nplot twist: it's not about being cultured.\nit's the living cultures we stir into milk every night.\nthey work the night shift —\neating the sugar, thickening the milk, turning it tangy.\nby morning, that's your greek yogurt.\nnothing rushes this. no shortcut exists.\nsame cultures, every batch — so every cup tastes the same.\nwe didn't name the shop after a vibe.\nwe named it after the tiny things doing the real work.\nevery drop counts — because every drop went through culture.\n\n#YogurtCulture #LiveCultures #SmallBatch #GreekYogurt #EveryDropCounts", "hashtags": ["#YogurtCulture", "#LiveCultures", "#SmallBatch", "#GreekYogurt", "#EveryDropCounts"], "hook_note": "บรรทัดแรกเปิดด้วยคำถาม curiosity-gap \"ชื่อร้านเราแปลว่าอะไร? คำตอบที่ถูกที่สุดคือ… ไม่ใช่วัฒนธรรม\" (ตาม Viral Hook Specialist) สร้างช่องว่างให้คนอยากเลื่อนหาคำตอบ — บรรทัดที่ 2 เฉลย origin story ทันที (culture = เชื้อจุลินทรีย์) พร้อมผูกภาพ craving \"ตักเนื้อโยเกิร์ตข้นๆ เข้าปาก\" ตั้งแต่ต้น (ตาม Food Content Creator) ไม่ปล่อยให้ย่อหน้าแรกเป็นข้อมูลล้วน. แก้ครบทั้ง 6 feedback: ตัด double-meaning ยาวๆ (พิพิธภัณฑ์/แล็บ) ออก เหลือเส้นเรื่องเดียวกระชับขึ้น ~50% (Millennial); เพิ่มมุม B2B \"เชื้อตัวเดียวกันลงทุกถัง ทุกล็อตที่ส่งคาเฟ่พาร์ทเนอร์ ข้นเหมือนกันทุกครั้ง\" ดึงเจ้าของคาเฟ่ที่มองหาซัพคุณภาพคงที่ (B2B); เพิ่มมุมคุมอาหารแบบไม่เคลมการแพทย์ \"ยิ่งหมักนาน เชื้อยิ่งกินน้ำตาลในนมไปบางส่วน → ครีมมี่ โปรตีนแน่น ไม่ต้องรู้สึกผิด\" — อิงข้อเท็จจริงเดิมในแคปชั่น (เชื้อเปลี่ยนแล็กโทสเป็นกรด) ไม่ใช่เคลมลดโรค (สายลดน้ำหนัก); เพิ่มบีต food-porn ก่อนปิด \"ผิวโยเกิร์ตเนียนเป็นเงา ช้อนแรกจมลงนุ่มหนึบ เย็นกำ  legible, in a bold lowercase geometric sans (BigSmalls-style for the headline, Albert Sans for the small line). Do not warp or misspell it:\n- HEADLINE, 2 lines, large, in the upper-center of the blue zone, bold lowercase, black #000000 — with the single word \"culture\" filled Mouthful Red #F2565C for emphasis:\n      what \"culture\"\n      really means\n- SUBLINE, one line, directly beneath the headline, smaller, regular weight, black #000000:\n      live cultures, working the night shift in your milk.\nGive the text generous breathing room; keep it crisp and never covered by doodles.\n\nDOODLE LAYER (thick black #000000 hand-drawn marker outlines, slightly wobbly, friendly Jester style): In the upper night zone (to the right of and around the text, never over it), draw a loose cluster of tiny smiling live-culture microbe characters (simple rounded blobs with dot eyes and little curved smiles, a few with tiny working arms) drifting down inside a doodle milk carton / milk drop, suggesting they are \"working overnight\" inside the milk. A few microbes have hearts for eyes. Add a doodle crescent moon and 2-3 small sparkle stars, all in black outline only. Draw a black doodle dotted motion line / arrow flowing from the cluster of microbes DOWN toward the real yogurt cup, visually telling the story \"night culture -> morning yogurt.\" Near the cup, add a black doodle spoon with a single yogurt drip, and one small black outline of a smiling mouth/tongue.\n\nCOLOR FILLS — USE BRAND COLORS ONLY: black #000000 line art and lettering; flat Dairy Blue #84D7FF night field; flat white #FFFFFF morning field. Use Mouthful Red #F2565C and Tasty Orange #FF8C33 ONLY as tiny accent spot-fills — e.g. the word \"culture\", red fill inside 2-3 microbe hearts and the corner word badge, orange fill on one or two sparkle stars or the spoon-drip highlight. Keep red and orange minimal (small accents, not large areas). ABSOLUTELY no other colors, no gradients, no soft shadows, no glow, no function copyText(t) {
  if (navigator.clipboard && navigator.clipboard.writeText) return navigator.clipboard.writeText(t);
  return new Promise((res) => {
    const ta = document.createElement('textarea'); ta.value = t; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); } catch(e){}
    document.body.removeChild(ta); res();
  });
}

function CalendarView({ onOpen }) {
  const schedMap = useMemo(() => {
    const m = {};

    const first = new Date(CAL_YEAR, CAL_MONTH, 1).getDay();

    const cells = [];
    for (let i=0;i<first;i++) cells.push(null);
    for (let d=1; d<=days; d++) cells.push(d);
    while (cells.length % 7) cells.push(null);
    const w = []; for (let i=0;i<cells.length;i+=7) w.push(cells.slice(i,i+7));
    return w;

// ---------- theme + font-size controls ----------
function Controls(){
  const [theme,setTheme]=useState(()=>{ try{return localStorage.getItem('yc-theme')||'system';}catch(e){return 'system';} });
  const [scale,setScale]=useState(()=>{ try{return parseFloat(localStorage.getItem('yc-scale'))||1.15;}catch(e){return 1.15;} });
  useEffect(()=>{
    const apply=()=>{ const dark = theme==='dark' || (theme==='system' && window.matchMedia('(prefers-color-scheme: dark)').matches); document.documentElement.classList.toggle('dark', dark); };
    apply(); try{localStorage.setItem('yc-theme',theme);}catch(e){}
    if(theme==='system'){ const mq=window.matchMedia('(prefers-color-scheme: dark)'); mq.addEventListener('change',apply); return ()=>mq.removeEventListener('change',apply); }
  },[theme]);
  useEffect(()=>{ document.documentElement.style.zoom=scale; try{localStorage.setItem('yc-scale',String(scale));}catch(e){} },[scale]);
  const ic = theme==='light'?'☀️':theme==='dark'?'🌙':'💻';
  const lb = theme==='light'?'สว่าง':theme==='dark'?'มืด':'ตามระบบ';
  const cycle=()=>setTheme(t=> t==='light'?'dark':t==='dark'?'system':'light');
  const dec=()=>setScale(s=>Math.max(0.9, Math.round((s-0.1)*10)/10));
  const inc=()=>setScale(s=>Math.min(1.7, Math.round((s+0.1)*10)/10));
  const btn="grid place-items-center w-7 h-7 rounded-full hover:bg-white/60 transition-colors cursor-pointer text-ink font-bold leading-none";
  return (
    <div className="ml-auto flex items-center gap-1.5">
      <div className="flex items-center gap-0.5 glass-soft rounded-full p-1" role="group" aria-label="ขนาดตัวอักษร">
        <button onClick={dec} className={btn} aria-label="ลดขนาดตัวอักษร">A−</button>
        <button onClick={()=>setScale(1.15)} className="px-1.5 text-[11px] font-semibold text-ink/60 hover:text-ink cursor-pointer tabular-nums" title="รีเซ็ตขนาด" aria-label="รีเซ็ตขนาดตัวอักษร">{Math.round(scale*100)}%</button>
        <button onClick={inc} className={btn} aria-label="เพิ่มขนาดตัวอักษร">A+</button>
      </div>
      <button onClick={cycle} className="inline-flex items-center gap-1.5 glass-soft rounded-full pl-2.5 pr-3 py-1.5 text-[12px] font-semibold text-ink hover:bg-white/60 transition-colors cursor-pointer" aria-label={`ธีมตอนนี้ ${lb} กดเพื่อสลับ สว่าง/มืด/ตามระบบ`}>
        <span aria-hidden="true">{ic}</span> {lb}
      </button>
    </div>
  );
}

// ---------- app ----------
function App() {
  const [tab, setTab] = useState('calendar');
  const [open, setOpen] = useState(null);
  return (
    <div className="relative min-h-screen">
      <div className="blob bg-brandred"   style={{width:340,height:340,top:-60,left:-40}}></div>
      <div className="blob bg-brandblue"  style={{width:420,height:420,top:120,right:-120}}></div>
      <div className="blob bg-brandorange"style={{width:300,height:300,bottom:-40,left:'30%'}}></div>

      <div className="relative z-10 max-w-5xl mx-auto px-3 sm:px-6 py-5 sm:py-8">
        <Header />

        <div className="flex items-center gap-2 mb-5">
          {[['calendar','ปฏิทิน'],['backlog',`Pipeline ${DATA.allTopics.length} หัวข้อ`]].map(([k,l])=>(
            <button key={k} onClick={()=>setTab(k)}
              className={`px-4 py-2 rounded-xl text-sm font-semibold transition-all duration-200 cursor-pointer
                ${tab===k ? 'bg-ink text-white shadow-lg' : 'glass-soft text-ink/65 hover:text-ink'}`}>
              {l}
            </button>
          ))}
          <Controls />
        </div>

        {tab==='calendar' ? <CalendarView onOpen={setOpen} /> : <Backlog onOpen={setOpen} />}

        <footer className="text-center text-[11px] text-ink/40 mt-8 pb-4">
          Yogurt Culture · Citizenship of Yogurt — “ทุกหยดมีความหมาย” · สร้างโดย Agent Lead + 12 personas
        </footer>
      </div>

      {open!=null && <PostModal id={open} onClose={()=>setOpen(null)} />}
      <Toast />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<script>
(function boot(){
  if(!window.Babel || !window.React || !window.ReactDOM){ return setTimeout(boot, 25); }
  try {
    var src = document.getElementById('appsrc').textContent;
    var out = Babel.transform(src, {presets: [['react', {runtime: 'classic'}]]}).code;
    (0, eval)(out);
  } catch (e) {
    console.error(e);
    document.getElementById('root').innerHTML = '<pre style="padding:24px;color:#F2565C;white-space:pre-wrap">'+ (e && e.message) +'</pre>';
  }
})();
</script>
</body>
</html>
