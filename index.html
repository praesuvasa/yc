  Branding:    { bg: 'bg-ink',        text: 'text-white', dot: '#0B0B0B', label: 'Branding' },

  Engagement:  { bg: 'bg-brandblue',  text: 'text-ink',   dot: '#84D7FF', label: 'Engagement' },
  PR:          { bg: 'bg-brandred',   text: 'text-white', dot: '#F2565C', label: 'PR' },
};
const pillarOf = (p) => PILLAR[p] || PILLAR.Branding;

const TH_DOW = ['อา','จ','อ','พ','พฤ','ศ','ส'];
const TH_MONTH = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
const TODAY = '2026-07-01';
const CAL_YEAR = 2026, CAL_MONTH = 6; // July (0-indexed)

function iso(y, m, d) { return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }

function copyText(t) {
  if (navigator.clipboard && navigator.clipboard.writeText) return navigator.clipboard.writeText(t);
  return new Promise((res) => {
    const ta = document.createElement('textarea'); ta.value = t; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); } catch(e){}
    document.body.removeChild(ta); res();
  });
}

// ---------- small UI atoms ----------
function CopyBtn({ text, label, big, tone }) {
  const [done, setDone] = useState(false);
  const cls = tone === 'dark'
    ? 'bg-ink text-white hover:bg-black'
    : 'bg-white/70 text-ink hover:bg-white border border-ink/15';
  return (
    <button
      onClick={() => { copyText(text).then(() => { setDone(true); setTimeout(()=>setDone(false), 1600); window.__toast && window.__toast(); }); }}
      className={`inline-flex items-center gap-1.5 rounded-xl font-medium transition-all duration-200 cursor-pointer active:scale-95 ${cls} ${big ? 'px-4 py-2.5 text-sm' : 'px-3 py-1.5 text-xs'}`}
    >
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
        {done
          ? <polyline points="20 6 9 17 4 12" />
          : <><rect x="9" y="9" width="13" height="13" rx="2" /><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" /></>}
      </svg>
      {done ? 'คัดลอกแล้ว' : label}
    </button>
  );
}

function Pill({ p, small }) {

}

// ---------- calendar ----------
function CalendarView({ onOpen }) {
  const schedMap = useMemo(() => {
    const m = {};
    DATA.schedule.forEach(s => { m[s.date] = DATA.posts[s.id]; });
    return m;
  }, []);
  const weeks = useMemo(() => {
    const first = new Date(CAL_YEAR, CAL_MONTH, 1).getDay();
    const days = new Date(CAL_YEAR, CAL_MONTH + 1, 0).getDate();
    const cells = [];
    for (let i=0;i<first;i++) cells.push(null);
    for (let d=1; d<=days; d++) cells.push(d);
    while (cells.length % 7) cells.push(null);
    const w = []; for (let i=0;i<cells.length;i+=7) w.push(cells.slice(i,i+7));
    return w;
  }, []);

  return (
    <div className="space-y-5">
      {/* ready posts rail */}
      <div className="glass rounded-3xl p-4 sm:p-5">
        <div className="flex items-center justify-between mb-3">
          <h2 className="font-bold text-ink">โพสต์พร้อมใช้ · {DATA.top5.length} ชิ้น</h2>
          <span className="text-[11px] text-ink/50">เรียงตามคะแนนหัวข้อ</span>
        </div>
        <div className="flex gap-3 overflow-x-auto no-scrollbar pb-1 -mx-1 px-1">
          {DATA.top5.map((p, i) => {
            const s = pillarOf(p.pillar);
            const date = DATA.schedule.find(x=>x.id===p.id);
            const dd = date ? Number(date.date.slice(8)) : null;
            return (
              <button key={p.id} onClick={()=>onOpen(p.id)}
                className="group text-left shrink-0 w-[230px] glass-soft rounded-2xl p-3.5 hover:-translate-y-1 hover:shadow-xl transition-all duration-200 cursor-pointer">
                <div className="flex items-center justify-between mb-2">
                  <div className="flex items-center gap-1.5">
                    <Pill p={p.pillar} small />
                    {p.track==='health' && <span className="text-[9px] font-bold text-ink bg-brandblue rounded-full px-1.5 py-0.5">🩺</span>}
                  </div>
                  {dd && <span className="text-[10px] font-semibold text-ink/60">{dd} ก.ค.</span>}
                </div>
                <div className="h-1.5 w-9 rounded-full mb-2" style={{background:s.dot}}></div>
                <p className="text-[13px] font-semibold text-ink leading-snug line-clamp-3 min-h-[54px]">{p.title}</p>
                <div className="flex items-center justify-between mt-2.5">
                  <ScoreBadge avg={p.topicAvg} min={p.captionMin} pass={p.captionMin>=8} />
                  <span className="text-[11px] font-medium text-ink/40 group-hover:text-ink transition-colors">เปิด →</span>
                </div>
              </button>
            );
          })}
        </div>
      </div>

      {/* month grid */}
      <div className="glass rounded-3xl p-4 sm:p-6">
        <div className="flex items-center justify-between mb-4">
          <h2 className="text-lg font-bold text-ink">{TH_MONTH[CAL_MONTH]} {CAL_YEAR + 543}</h2>
          <div className="flex items-center gap-2.5 flex-wrap justify-end">
            {['Branding','Education','Product','Inspiration'].map(k=>(
              <span key={k} className="inline-flex items-center gap-1 text-[10px] text-ink/60">
                <span className="w-2.5 h-2.5 rounded-full" style={{background:pillarOf(k).dot, border:'1px solid rgba(0,0,0,.15)'}}></span>{k}
              </span>
            ))}
          </div>
        </div>
        <div className="grid grid-cols-7 gap-1 sm:gap-2">
          {TH_DOW.map((d,i)=>(<div key={i} className="text-center text-[11px] font-semibold text-ink/45 pb-1">{d}</div>))}
          {weeks.flat().map((d, i) => {
            if (!d) return <div key={i} className="aspect-square sm:aspect-[4/5]"></div>;
            const key = iso(CAL_YEAR, CAL_MONTH, d);
            const post = schedMap[key];
            const isToday = key === TODAY;
            const s = post ? pillarOf(post.pillar) : null;
            return (
              <div key={i}
                onClick={post ? ()=>onOpen(post.id) : undefined}
                className={`relative aspect-square sm:aspect-[4/5] rounded-xl sm:rounded-2xl p-1.5 sm:p-2 border transition-all duration-200 overflow-hidden
                  ${post ? 'cursor-pointer hover:-translate-y-0.5 hover:shadow-lg glass-soft border-white/70' : 'bg-white/25 border-white/40'}
                  ${isToday ? 'ring-2 ring-ink' : ''}`}>
                <div className={`text-[11px] sm:text-xs font-semibold ${isToday ? 'text-ink' : 'text-ink/55'}`}>{d}</div>
                {isToday && <div className="text-[8px] text-ink/50 -mt-0.5 hidden sm:block">วันนี้</div>}
                {post && (
                  <>
                    <div className="hidden sm:block mt-1">
                      <div className={`rounded-lg ${s.bg} ${s.text} px-1.5 py-1`}>
                        <div className="text-[9px] font-bold leading-tight line-clamp-3">{post.title}</div>

                    <div className="sm:hidden absolute bottom-1 left-1/2 -translate-x-1/2 w-2 h-2 rounded-full" style={{background:s.dot, border:'1px solid rgba(0,0,0,.2)'}}></div>
                  </>
                )}
              </div>
            );
          })}
        </div>
        <p className="text-[11px] text-ink/45 mt-3 sm:hidden">แตะวันที่มีจุดสี เพื่อเปิดโพสต์ · หรือเลื่อนการ์ดด้านบน</p>
      </div>
    </div>
  );
}

// ---------- toast ----------
function Toast() {
  const [show, setShow] = useState(false);
  useEffect(()=>{ window.__toast = ()=>{ setShow(true); setTimeout(()=>setShow(false), 1500); }; }, []);
  if (!show) return null;
  return (
    <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-[60] bg-ink text-white text-sm font-medium px-5 py-2.5 rounded-full shadow-2xl flex items-center gap-2" style={{animation:'toastin .2s ease-out both'}}>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      คัดลอกไปคลิปบอร์ดแล้ว
    </div>
  );
}

// ---------- theme + font-size controls ----------
function Controls(){
  const [theme,setTheme]=useState(()=>{ try{return localStorage.getItem('yc-theme')||'system';}catch(e){return 'system';} });
  const [scale,setScale]=useState(()=>{ try{return parseFloat(localStorage.getItem('yc-scale'))||1.15;}catch(e){return 1.15;} });
  useEffect(()=>{
    const apply=()=>{ const dark = theme==='dark' || (theme==='system' && window.matchMedia('(prefers-color-scheme: dark)').matches); document.documentElement.classList.toggle('dark', dark); };
    apply(); try{localStorage.setItem('yc-theme',theme);}catch(e){}
    if(theme==='system'){ const mq=window.matchMedia('(prefers-color-scheme: dark)'); mq.addEventListener('change',apply); return ()=>mq.removeEventListener('change',apply); }
  },[theme]);
  useEffect(()=>{ document.documentElement.style.zoom=scale; try{localStorage.setItem('yc-scale',String(scale));}catch(e){} },[scale]);
  const ic = theme==='light'?'☀️':theme==='dark'?'🌙':'💻';
  const lb = theme==='light'?'สว่าง':theme==='dark'?'มืด':'ตามระบบ';
  const cycle=()=>setTheme(t=> t==='light'?'dark':t==='dark'?'system':'light');
  const dec=()=>setScale(s=>Math.max(0.9, Math.round((s-0.1)*10)/10));
  const inc=()=>setScale(s=>Math.min(1.7, Math.round((s+0.1)*10)/10));
  const btn="grid place-items-center w-7 h-7 rounded-full hover:bg-white/60 transition-colors cursor-pointer text-ink font-bold leading-none";
  return (
    <div className="ml-auto flex items-center gap-1.5">
      <div className="flex items-center gap-0.5 glass-soft rounded-full p-1" role="group" aria-label="ขนาดตัวอักษร">
        <button onClick={dec} className={btn} aria-label="ลดขนาดตัวอักษร">A−</button>
        <button onClick={()=>setScale(1.15)} className="px-1.5 text-[11px] font-semibold text-ink/60 hover:text-ink cursor-pointer tabular-nums" title="รีเซ็ตขนาด" aria-label="รีเซ็ตขนาดตัวอักษร">{Math.round(scale*100)}%</button>
        <button onClick={inc} className={btn} aria-label="เพิ่มขนาดตัวอักษร">A+</button>
      </div>
      <button onClick={cycle} className="inline-flex items-center gap-1.5 glass-soft rounded-full pl-2.5 pr-3 py-1.5 text-[12px] font-semibold text-ink hover:bg-white/60 transition-colors cursor-pointer" aria-label={`ธีมตอนนี้ ${lb} กดเพื่อสลับ สว่าง/มืด/ตามระบบ`}>
        <span aria-hidden="true">{ic}</span> {lb}
      </button>
    </div>
  );
}
